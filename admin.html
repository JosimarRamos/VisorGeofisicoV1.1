<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Geofísico - Proyectos</title>
    <script src="shared/js/tokens.js"></script>
    <link rel="stylesheet" href="shared/css/visor-styles.css">
    <style>
        body { margin:0; background: var(--bg-color); color: var(--text-color); font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
        h1 { color: var(--accent-color); }
        ul { list-style:none; padding:0; min-width:400px; }
        li { margin:12px 0; display:flex; align-items:center; gap:8px; }
        .proj-link { color: var(--accent-color); text-decoration:none; font-size:18px; padding:10px 20px; border:1px solid var(--border-color); border-radius:8px; flex:1; text-align:center; transition:background .2s; display:block; }
        .proj-link:hover { background: var(--sidebar-bg); }
        .btn-share { background:none; border:1px solid var(--border-color); border-radius:8px; color:#888; cursor:pointer; font-size:20px; padding:8px 12px; transition:background .2s,color .2s; line-height:1; }
        .btn-share:hover { background: var(--sidebar-bg); color: var(--accent-color); }
    </style>
</head>
<body>
<script>
if (new URLSearchParams(location.search).get('k') !== window.ADMIN_TOKEN) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:sans-serif;font-size:24px;background:#0f0f0f;">🔒 Acceso restringido</div>';
}
</script>
    <h1>🗺️ Visores Geofísicos</h1>
    <p style="color:#888;">Proyectos activos:</p>
    <ul>
        <li><a class="proj-link" href="#" onclick="abrirProyecto('proyecto-mariscal-01', 0, event)">📌 MARISCAL_01</a><button class="btn-share" onclick="copiarEnlace('proyecto-mariscal-01',0,this)" title="Copiar enlace">⧉</button></li>
        <li><a class="proj-link" href="#" onclick="abrirProyecto('Proyecto-kerem-ejemplo', 1, event)">📌 KEREM EJEMPLO</a><button class="btn-share" onclick="copiarEnlace('Proyecto-kerem-ejemplo',1,this)" title="Copiar enlace">⧉</button></li>
    </ul>
    <script>
    function abrirProyecto(proyecto, tokenIdx, event) {
        if (event) event.preventDefault();
        const token = window.TOKEN_POOL[tokenIdx];
        window.location.href = 'index.html?p=' + proyecto + '&k=' + token;
    }
    function copiarEnlace(proyecto, tokenIdx, btn) {
        const token = window.TOKEN_POOL[tokenIdx];
        var url = location.origin + location.pathname.replace(/\/[^\/]*$/,'') + '/index.html?p=' + proyecto + '&k=' + token;
        navigator.clipboard.writeText(url).then(function() {
            var t = btn.textContent;
            btn.textContent = '✓';
            btn.style.color = '#4caf50';
            setTimeout(function() { btn.textContent = t; btn.style.color = ''; }, 2000);
        }).catch(function() {
            prompt('Copia el enlace manualmente:', url);
        });
    }
    </script>
</body>
</html>
