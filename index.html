<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Geofísico - Proyectos</title>
    <style>
        body { margin:0; background:#0f0f0f; color:#e0e0e0; font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
        h1 { color:#29b6f6; }
        ul { list-style:none; padding:0; }
        li { margin:12px 0; }
        a { color:#29b6f6; text-decoration:none; font-size:18px; padding:10px 20px; border:1px solid #3a3a3a; border-radius:8px; display:block; text-align:center; transition:background .2s; }
        a:hover { background:#1e1e1e; }
        .btn-admin { margin-top:30px; padding:10px 20px; background:#333; color:#888; border:1px solid #3a3a3a; border-radius:8px; cursor:pointer; font-size:14px; font-family:inherit; transition:background .2s; }
        .btn-admin:hover { background:#444; color:#fff; }
    </style>
</head>
<body>
<script>
if (new URLSearchParams(location.search).get('k') !== 'admin-2024') {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:sans-serif;font-size:24px;background:#0f0f0f;">🔒 Acceso restringido</div>';
}
</script>
    <h1>🗺️ Visores Geofísicos</h1>
    <p style="color:#888;">Selecciona un proyecto:</p>
    <ul>
        <li><a href="proyectos/proyecto-mariscal-01/">📌 MARISCAL_01</a></li>
    </ul>
    <button class="btn-admin" onclick="(function(){var u=location.origin+location.pathname.split('?')[0]+'?k=admin-2024';navigator.clipboard.writeText(u).then(function(){this.textContent='✓ Copiado';setTimeout(function(){this.textContent='📋 Copiar enlace admin'}.bind(this),2000)}.bind(this)).catch(function(){prompt('Copia manual:',u)})})()">📋 Copiar enlace admin</button>
</body>
</html>
